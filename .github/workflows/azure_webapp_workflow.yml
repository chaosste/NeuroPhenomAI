name: Build and deploy Node app to Azure Web App

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  AZURE_WEBAPP_NAME: neurophenom-finesse
  NODE_VERSION: "22.x"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # Create a production-only node_modules for runtime
      - name: Install production dependencies only
        run: |
          rm -rf node_modules
          npm ci --omit=dev

      - name: Prepare deploy folder
        run: |
          rm -rf deploy
          mkdir -p deploy/docs/knowledge
          cp -R dist deploy/dist
          cp -R node_modules deploy/node_modules
          cp -R docs/knowledge/core deploy/docs/knowledge/core
          cp server.js deploy/server.js
          cp package.json deploy/package.json
          cp package-lock.json deploy/package-lock.json

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: deploy

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: .

      - name: Validate publish profile secret
        shell: bash
        run: |
          set -euo pipefail
          [[ -n "${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}" ]] || { echo "Missing AZURE_WEBAPP_PUBLISH_PROFILE"; exit 1; }
          [[ -n "${AZURE_WEBAPP_NAME:-}" ]] || { echo "AZURE_WEBAPP_NAME is empty"; exit 1; }

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: .

      - name: Post-deploy health check
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "${{ vars.AZURE_WEBAPP_HEALTHCHECK_URL }}" ]]; then
            HEALTHCHECK_URL="${{ vars.AZURE_WEBAPP_HEALTHCHECK_URL }}"
          else
            HEALTHCHECK_URL="https://${AZURE_WEBAPP_NAME}.azurewebsites.net/api/health"
          fi

          echo "Checking ${HEALTHCHECK_URL}"
          for i in {1..10}; do
            if curl --silent --show-error --fail --max-time 20 "${HEALTHCHECK_URL}" > /tmp/health_response.json; then
              echo "Health check passed."
              cat /tmp/health_response.json
              exit 0
            fi
            echo "Health check attempt ${i}/10 failed; retrying in 15s..."
            sleep 15
          done

          echo "Health check failed after retries."
          exit 1
