name: Deploy Cloud Run showcase

# Manual by default until GCP Workload Identity Federation secrets are configured.
# Local/one-shot deploy already works via: gcloud builds submit --config=cloudbuild.yaml
on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  GCP_PROJECT_ID: microphenom-ai
  GCP_REGION: us-west1
  CLOUD_RUN_SERVICE: neurophenom-ai-showcase

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Require GCP WIF secrets
        env:
          WIF: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          SA: ${{ secrets.GCP_SERVICE_ACCOUNT }}
        run: |
          set -euo pipefail
          if [[ -z "${WIF}" || -z "${SA}" ]]; then
            echo "Missing GCP_WORKLOAD_IDENTITY_PROVIDER / GCP_SERVICE_ACCOUNT."
            echo "Deploy locally with: gcloud builds submit --project=microphenom-ai --config=cloudbuild.yaml --substitutions=COMMIT_SHA=\$(git rev-parse HEAD) ."
            echo "See docs/CLOUD_RUN_SHOWCASE.md"
            exit 1
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Submit Cloud Build
        run: |
          set -euo pipefail
          gcloud builds submit \
            --project="${{ env.GCP_PROJECT_ID }}" \
            --config=cloudbuild.yaml \
            --substitutions=COMMIT_SHA="${GITHUB_SHA}" \
            .

      - name: Health check
        run: |
          set -euo pipefail
          URL="$(gcloud run services describe "${{ env.CLOUD_RUN_SERVICE }}" \
            --project="${{ env.GCP_PROJECT_ID }}" \
            --region="${{ env.GCP_REGION }}" \
            --format='value(status.url)')"
          echo "Checking ${URL}/api/health"
          for i in {1..15}; do
            if curl -sS --fail --max-time 20 "${URL}/api/health" | tee /tmp/cr_health.json; then
              grep -Fq '"ok":true' /tmp/cr_health.json
              exit 0
            fi
            sleep 8
          done
          exit 1
