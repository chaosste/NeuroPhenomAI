name: Rollback Azure Web App

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to redeploy (tag, branch, or commit SHA)"
        required: true
      healthcheck_url:
        description: "Optional full health check URL override"
        required: false
        default: ""

permissions:
  contents: read
  id-token: write

env:
  AZURE_WEBAPP_NAME: neurophenom
  NODE_VERSION: "22.x"

jobs:
  rollback:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout selected ref
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install production dependencies only
        run: |
          rm -rf node_modules
          npm ci --omit=dev

      - name: Prepare deploy folder
        run: |
          rm -rf deploy
          mkdir -p deploy
          cp -R dist deploy/dist
          cp -R node_modules deploy/node_modules
          cp server.js deploy/server.js
          cp package.json deploy/package.json
          cp package-lock.json deploy/package-lock.json

      - name: Preflight secret checks
        id: preflight
        shell: bash
        env:
          PUBLISH_PROFILE: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          set -euo pipefail
          if [[ -n "${PUBLISH_PROFILE}" ]]; then
            echo "Deploy mode: publish-profile"
            echo "deploy_mode=publish_profile" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          [[ -n "${AZURE_CLIENT_ID}" ]] || { echo "Missing AZURE_CLIENT_ID"; exit 1; }
          [[ -n "${AZURE_TENANT_ID}" ]] || { echo "Missing AZURE_TENANT_ID"; exit 1; }
          [[ -n "${AZURE_SUBSCRIPTION_ID}" ]] || { echo "Missing AZURE_SUBSCRIPTION_ID"; exit 1; }
          echo "deploy_mode=oidc" >> "$GITHUB_OUTPUT"

      - name: Azure login (OIDC)
        if: ${{ steps.preflight.outputs.deploy_mode == 'oidc' }}
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Web App (Publish Profile)
        if: ${{ steps.preflight.outputs.deploy_mode == 'publish_profile' }}
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: deploy

      - name: Deploy to Azure Web App (OIDC)
        if: ${{ steps.preflight.outputs.deploy_mode == 'oidc' }}
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: deploy

      - name: Post-rollback health check
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "${{ github.event.inputs.healthcheck_url }}" ]]; then
            HEALTHCHECK_URL="${{ github.event.inputs.healthcheck_url }}"
          elif [[ -n "${{ vars.AZURE_WEBAPP_HEALTHCHECK_URL }}" ]]; then
            HEALTHCHECK_URL="${{ vars.AZURE_WEBAPP_HEALTHCHECK_URL }}"
          else
            HEALTHCHECK_URL="https://${AZURE_WEBAPP_NAME}.azurewebsites.net/api/health"
          fi

          for i in {1..10}; do
            if curl --silent --show-error --fail --max-time 20 "${HEALTHCHECK_URL}" > /tmp/health_response.json; then
              cat /tmp/health_response.json
              exit 0
            fi
            echo "Health check attempt ${i}/10 failed; retrying in 15s..."
            sleep 15
          done
          exit 1
