# Cloud Run showcase deploy (Gemini Live proxy).
# Primary production remains Azure App Service.
# Trigger manually or via GitHub Actions workflow_dispatch / push path filter.

substitutions:
  _SERVICE: neurophenom-ai-showcase
  _REGION: us-west1
  _SECRET: gemini-api-key

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - --build-arg
      - VITE_SHOWCASE_MODE=true
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/${_SERVICE}:$COMMIT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/${_SERVICE}:latest
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/${_SERVICE}

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/${_SERVICE}:$COMMIT_SHA
      - --region
      - ${_REGION}
      - --platform
      - managed
      - --allow-unauthenticated
      - --min-instances
      - '0'
      - --max-instances
      - '2'
      - --memory
      - 512Mi
      - --cpu
      - '1'
      - --set-env-vars
      - SHOWCASE_MODE=true
      - --set-secrets
      - GEMINI_API_KEY=${_SECRET}:latest
      - --quiet

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/${_SERVICE}:$COMMIT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/${_SERVICE}:latest

options:
  logging: CLOUD_LOGGING_ONLY
